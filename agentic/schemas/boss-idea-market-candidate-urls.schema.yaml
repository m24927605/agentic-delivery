schema:
  id: boss-idea-market-candidate-urls
  required_fields:
    - candidates
  candidate_required_fields:
    - query_id
    - url
    - title
    - snippet
    - provider
    - retrieved_at
  allowed_providers:
    - fixture
    - seed_replay
    - live_seed
    - brave
    - searxng
    - duckduckgo_html
    - local_browser_search
  fallback_provider_metadata_required_fields:
    providers:
      - duckduckgo_html
      - local_browser_search
    fields:
      - fallback_from
      - lower_trust_fallback
      - no_paid_engine_policy
      - result_rank
  authority_note: Candidate URLs are evidence inputs only. They cannot approve artifacts, budget, roadmap, or implementation.
