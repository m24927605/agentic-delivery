schema:
  id: boss-decision-memo
  required_sections:
    - Recommendation
    - Decision Needed
    - Context
    - Evidence Summary
    - Options Considered
    - Recommended Path
    - Time And Staffing
    - Risks And Unknowns
    - Success Metrics
    - Next Step
  allowed_recommendations:
    - do
    - defer
    - no_go
    - poc
    - mvp
  artifact_statuses:
    - drafted
    - reviewed
    - approved
    - rejected
  implementation_approval_assertion_pattern: '^Implementation Approval:\s*approved for implementation\s*$'
