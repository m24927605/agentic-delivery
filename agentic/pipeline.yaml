memory:
  from_profile: true

decision_policy:
  accepted:
    criteria:
      - conforms_to_profile_source_of_truth
      - reduces_profile_defined_risk
      - does_not_expand_profile_boundary
  rejected:
    criteria:
      - matches_profile_rejected_direction
      - introduces_unapproved_dependency
      - makes_internal_tools_customer_facing
  deferred:
    criteria:
      - useful_but_not_phase_0_or_phase_1
      - requires_human_business_decision
      - requires_pilot_customer_choice
