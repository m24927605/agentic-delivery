version: v0.6
purpose: Hermes action contract for the public-safe Agentic Delivery System scaffold.
state_authority: repo_manifest
identity_policy: agentic/identity-policy.yaml
rules:
  - Hermes memory is execution context only.
  - Repo-local manifest is authoritative run state.
  - Every action must map to a repo-local command.
  - Hermes must not modify profile source of truth.
  - Hermes must not simulate Claude Code agency-agents review.

defaults:
  shell: bash
  working_directory: repo_root
  review_only: true
  max_code_review_rounds_per_slice: 5

execute_mode:
  dry_run_available_for_all_actions: true
  mutating_actions_require_pre_post_validation: true
  pre_validation_command: scripts/validate-agentic-system.sh
  post_validation_command: scripts/validate-agentic-system.sh
  operator_decision_actions:
    - update_artifact_status
    - run_artifact_review_loop
    - run_implementation_review_loop
  executable_actions:
    - validate_scaffold
    - start_planning_run
    - start_boss_idea_run
    - update_run_state
    - update_artifact_status
    - generate_artifacts
    - run_artifact_generation_agent
    - run_artifact_review_loop
    - create_artifact_revision_tasks
    - start_implementation_run
    - generate_implementation_task_graph
    - dispatch_implementation_task
    - execute_implementation_task
    - run_implementation_review_loop
    - validate_implementation_run
    - validate_manifest_schema
    - validate_artifact_templates
    - validate_boss_idea_research
    - crawl_boss_idea_market
    - score_boss_idea_feasibility
    - generate_boss_decision_memo
    - validate_boss_decision_memo
    - plan_boss_idea_poc_mvp
    - validate_boss_idea_poc_mvp
    - validate_boss_idea_success_metrics
    - record_boss_idea_decision
    - validate_boss_idea_decision
    - privacy_scan_tracked
    - run_golden_fixtures
    - record_validation_evidence
    - hermes_memory_sync
    - hermes_scheduler_dry_run
    - hermes_gateway_dry_run
    - run_agency_review
    - summarize_review
    - report_run_status

success_signal_types:
  - stdout_contains
  - file_exists
  - manifest_path
  - manifest_field_equals
  - directory_has_files

actions:
  - id: validate_scaffold
    purpose: Validate core Agentic Delivery System scaffold and selected profile.
    mode: both
    command_template: scripts/validate-agentic-system.sh
    required_inputs: []
    optional_inputs:
      - PROFILE
    reads:
      - agentic/pipeline.yaml
      - agentic/profiles/*.yaml
      - scripts/*.sh
    writes: []
    success_signals:
      - stdout_contains: agentic system scaffold ok
    failure_states:
      - blocked_schema_invalid
      - blocked_missing_source
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: start_planning_run
    purpose: Initialize a manifest-backed planning delivery run.
    mode: planning
    authorization:
      action: planning.run.initialize
    command_template: PROFILE={{profile}} RUN_ID={{run_id}} scripts/init-agentic-run.sh {{goal}}
    required_inputs:
      - goal
    optional_inputs:
      - profile
      - run_id
    reads:
      - agentic/pipeline.yaml
      - agentic/profiles/{{profile}}.yaml
    writes:
      - agentic/runs/{{run_id}}/manifest.yaml
    success_signals:
      - file_exists: agentic/runs/{{run_id}}/manifest.yaml
      - manifest_path: agentic/runs/{{run_id}}/manifest.yaml
      - manifest_field_equals:
          path: run.state
          value: initialized
    failure_states:
      - blocked_missing_source
      - blocked_schema_invalid
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: update_run_state
    purpose: Update planning or implementation run state using the shared state machine.
    mode: both
    authorization:
      action: run.state.update
    command_template: scripts/update-run-state.sh {{run_id}} {{state}}
    required_inputs:
      - run_id
      - state
    optional_inputs: []
    reads:
      - agentic/pipeline.yaml
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
    writes:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
    success_signals:
      - manifest_field_equals:
          path: run.state
          value: "{{state}}"
    failure_states:
      - blocked_schema_invalid
      - blocked_human_decision_required
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: start_boss_idea_run
    purpose: Initialize a boss idea response planning run from a structured idea file.
    mode: planning
    authorization:
      action: planning.run.initialize
    command_template: RUN_ID={{run_id}} scripts/init-boss-idea-run.sh --goal-file {{goal_file}}
    required_inputs:
      - goal_file
      - run_id
    optional_inputs: []
    reads:
      - agentic/pipeline.yaml
      - agentic/profiles/boss-idea-response.yaml
      - agentic/schemas/boss-idea-intake.schema.yaml
      - "{{goal_file}}"
    writes:
      - agentic/runs/{{run_id}}/manifest.yaml
    success_signals:
      - stdout_contains: boss idea intake initialized
      - manifest_path: agentic/runs/{{run_id}}/manifest.yaml
      - manifest_field_equals:
          path: run.profile
          value: boss-idea-response
    failure_states:
      - blocked_missing_source
      - blocked_schema_invalid
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: update_artifact_status
    purpose: Update one planning artifact lifecycle status and append approval audit history.
    mode: planning
    authorization:
      action: artifact.status.update
    command_template: scripts/update-artifact-status.sh {{run_id}} {{artifact_path}} {{status}} --reason {{reason}}
    required_inputs:
      - run_id
      - artifact_path
      - status
      - reason
    optional_inputs: []
    input_contract:
      run_id: "Planning run id containing the artifact."
      artifact_path: "Artifact path exactly as recorded in agentic/runs/<run-id>/manifest.yaml."
      status: "One of planned, drafted, reviewed, changes_requested, approved, rejected, deferred."
      reason: "Public-safe audit reason for the status transition."
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
    writes:
      - agentic/runs/{{run_id}}/manifest.yaml
    success_signals:
      - stdout_contains: updated artifact status
      - manifest_path: agentic/runs/{{run_id}}/manifest.yaml
    failure_states:
      - blocked_missing_source
      - blocked_schema_invalid
      - blocked_human_decision_required
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: generate_artifacts
    purpose: Generate or refresh drafted planning artifacts from the manifest without approving them.
    mode: planning
    authorization:
      action: artifact.generate
    command_template: scripts/generate-artifacts.sh {{run_id}}
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/profiles/*.yaml
    writes:
      - agentic/runs/{{run_id}}/manifest.yaml
      - docs/**/*.md
      - docs/**/*.yaml
      - agentic/README.md
    success_signals:
      - stdout_contains: generated artifacts
      - manifest_path: agentic/runs/{{run_id}}/manifest.yaml
    failure_states:
      - blocked_missing_source
      - blocked_schema_invalid
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: run_artifact_generation_agent
    purpose: Preview AI document-generation work for requested artifacts in a planning manifest.
    mode: planning
    authorization:
      action: artifact.generate
    command_template: scripts/run-artifact-generation-agent.sh --dry-run {{run_id}}
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
    writes:
      - agentic/runs/{{run_id}}/artifact-generation/*.prompt.md
    success_signals:
      - stdout_contains: artifact generation agent dry-run
    failure_states:
      - blocked_missing_source
      - blocked_schema_invalid
      - blocked_human_decision_required
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: run_artifact_review_loop
    purpose: Record one bounded artifact review loop round with ignored local evidence.
    mode: planning
    authorization:
      action: artifact.review.record
    command_template: scripts/run-artifact-review-loop.sh {{run_id}}
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/prompts/review-agent.md
    writes:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/reviews/auto-doc-to-implementation/{{run_id}}/*.json
    success_signals:
      - stdout_contains: review loop completed
    failure_states:
      - blocked_review_failed
      - blocked_human_decision_required
    retry_policy:
      retryable: true
      max_attempts: 5
      requires_human_decision_on_exhaustion: true

  - id: create_artifact_revision_tasks
    purpose: Convert artifact review findings into bounded revision tasks without approving artifacts.
    mode: planning
    authorization:
      action: artifact.revision.create
    command_template: scripts/create-artifact-revision-tasks.sh {{run_id}}
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/reviews/auto-doc-to-implementation/{{run_id}}/*.json
    writes:
      - agentic/runs/{{run_id}}/manifest.yaml
    success_signals:
      - stdout_contains: artifact revision tasks ready
    failure_states:
      - blocked_missing_source
      - blocked_review_failed
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: run_agency_review
    purpose: Run profile-declared Claude Code agency-agents through AIT for a planning run.
    mode: planning
    authorization:
      action: agency.review.run
    command_template: RUN_ID={{run_id}} scripts/run-agency-review.sh
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/prompts/review-agent.md
      - agentic/profiles/*.yaml
    writes:
      - agentic/runs/{{run_id}}/review-outputs/*.json
      - agentic/runs/{{run_id}}/manifest.yaml
    success_signals:
      - manifest_field_equals:
          path: run.state
          value: agency_review_completed
      - directory_has_files:
          path: agentic/runs/{{run_id}}/review-outputs
          pattern: "*.json"
    failure_states:
      - blocked_review_failed
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: summarize_review
    purpose: Summarize AIT review outputs for a planning run.
    mode: planning
    authorization:
      action: review.summary.write
    command_template: scripts/summarize-agency-review.sh {{run_id}}
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/review-outputs/*.json
      - agentic/runs/{{run_id}}/manifest.yaml
    writes:
      - agentic/runs/{{run_id}}/review-summary.md
      - agentic/runs/{{run_id}}/manifest.yaml
    success_signals:
      - file_exists: agentic/runs/{{run_id}}/review-summary.md
    failure_states:
      - blocked_review_failed
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: start_implementation_run
    purpose: Initialize an implementation run from approved artifacts in a parent planning run.
    mode: implementation
    authorization:
      action: implementation.run.initialize
    command_template: RUN_ID={{run_id}} scripts/init-implementation-run.sh {{implementation_args}}
    required_inputs:
      - implementation_args
    optional_inputs:
      - run_id
    input_contract:
      implementation_args: "Complete CLI argument fragment containing --planning-run <id>; optional --artifact <path> arguments must also be approved in that parent planning run."
      profile_override: "Pass --profile <id> inside implementation_args when an explicit implementation profile override is required."
      aliases:
        planning_run: "Runner convenience alias rendered as --planning-run <id>."
        parent_planning_run: "Runner convenience alias rendered as --planning-run <id>."
    reads:
      - agentic/pipeline.yaml
      - agentic/profiles/*.yaml
      - agentic/runs/{{parent_planning_run}}/manifest.yaml
    writes:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
    success_signals:
      - file_exists: agentic/runs/{{run_id}}/implementation-manifest.yaml
      - manifest_path: agentic/runs/{{run_id}}/implementation-manifest.yaml
      - manifest_field_equals:
          path: run.mode
          value: implementation
    failure_states:
      - blocked_missing_approved_artifact
      - blocked_missing_source
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: generate_implementation_task_graph
    purpose: Convert approved implementation inputs into bounded implementation tasks.
    mode: implementation
    authorization:
      action: implementation.task.graph
    command_template: scripts/generate-implementation-task-graph.sh {{run_id}}
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
    writes:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
    success_signals:
      - stdout_contains: implementation task graph ok
      - manifest_path: agentic/runs/{{run_id}}/implementation-manifest.yaml
    failure_states:
      - blocked_missing_approved_artifact
      - blocked_schema_invalid
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: dispatch_implementation_task
    purpose: Dispatch one implementation task while enforcing disjoint write scope.
    mode: implementation
    authorization:
      action: implementation.task.dispatch
    command_template: scripts/dispatch-implementation-task.sh {{run_id}} {{task_id}}
    required_inputs:
      - run_id
      - task_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
    writes:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
      - agentic/runs/{{run_id}}/dispatch/{{task_id}}.yaml
    success_signals:
      - stdout_contains: worker dispatch ready
    failure_states:
      - blocked_overlapping_write_scope
      - blocked_schema_invalid
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: execute_implementation_task
    purpose: Execute one bounded implementation task and record ignored worker validation evidence.
    mode: implementation
    authorization:
      action: implementation.task.execute
    command_template: scripts/execute-implementation-task.sh {{run_id}} {{task_id}}
    required_inputs:
      - run_id
      - task_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
    writes:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
      - agentic/runs/{{run_id}}/worker/{{task_id}}/*.log
      - agentic/reviews/auto-doc-to-implementation/h16/{{run_id}}/{{task_id}}/*.log
    success_signals:
      - stdout_contains: implementation task execution completed
    failure_states:
      - blocked_tests_failed
      - blocked_overlapping_write_scope
      - blocked_schema_invalid
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: run_implementation_review_loop
    purpose: Record one bounded implementation review-fix round for a completed task.
    mode: implementation
    authorization:
      action: implementation.review.record
    command_template: scripts/run-implementation-review-loop.sh {{run_id}} {{task_id}}
    required_inputs:
      - run_id
      - task_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
      - agentic/prompts/slice-code-review.md
    writes:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
      - agentic/reviews/auto-doc-to-implementation/h18/{{run_id}}/{{task_id}}/*.json
    success_signals:
      - stdout_contains: implementation review loop completed
    failure_states:
      - blocked_code_review_required
      - blocked_human_decision_required
    retry_policy:
      retryable: true
      max_attempts: 5
      requires_human_decision_on_exhaustion: true

  - id: validate_implementation_run
    purpose: Validate implementation manifest structure and required inputs.
    mode: implementation
    command_template: scripts/validate-implementation-run.sh {{run_id}}
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
      - agentic/pipeline.yaml
    writes: []
    success_signals:
      - stdout_contains: implementation manifest ok
    failure_states:
      - blocked_missing_approved_artifact
      - blocked_schema_invalid
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: validate_manifest_schema
    purpose: Validate planning or implementation manifest schema invariants.
    mode: both
    command_template: scripts/validate-manifest-schema.sh {{run_id}}
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/runs/{{run_id}}/implementation-manifest.yaml
      - agentic/schemas/manifest.schema.yaml
    writes: []
    success_signals:
      - stdout_contains: manifest schema ok
    failure_states:
      - blocked_schema_invalid
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: validate_artifact_templates
    purpose: Validate generated and requested artifact sections for a planning run.
    mode: planning
    command_template: scripts/validate-artifact-templates.sh {{run_id}}
    required_inputs:
      - run_id
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/schemas/artifact-template.schema.yaml
    writes: []
    success_signals:
      - stdout_contains: artifact templates ok
    failure_states:
      - blocked_schema_invalid
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: validate_boss_idea_research
    purpose: Validate source-backed market research evidence for a boss idea run.
    mode: planning
    command_template: scripts/validate-boss-idea-research.sh {{research_file}}
    required_inputs:
      - research_file
    optional_inputs: []
    reads:
      - "{{research_file}}"
      - agentic/schemas/boss-idea-research.schema.yaml
    writes: []
    success_signals:
      - stdout_contains: boss idea research ok
    failure_states:
      - blocked_schema_invalid
      - blocked_missing_source
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: collect_boss_idea_research
    purpose: Generate source-backed market and competitor research from a boss idea run and public-safe search results.
    mode: planning
    authorization:
      action: artifact.generate
    command_template: scripts/collect-boss-idea-research.sh {{run_id}} --search-results {{search_results}} --output {{research_file}}
    required_inputs:
      - run_id
      - search_results
      - research_file
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/schemas/boss-idea-market-search.schema.yaml
      - agentic/schemas/boss-idea-research.schema.yaml
      - "{{search_results}}"
    writes:
      - "{{research_file}}"
      - agentic/runs/{{run_id}}/market-research-query-pack.yaml
      - agentic/runs/{{run_id}}/manifest.yaml
    success_signals:
      - stdout_contains: boss idea market research collected
      - file_exists: "{{research_file}}"
    failure_states:
      - blocked_schema_invalid
      - blocked_missing_source
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: crawl_boss_idea_market
    purpose: Generate deterministic Crawl4AI-compatible market discovery evidence for a boss idea run.
    mode: planning
    authorization:
      action: artifact.generate
    command_template: scripts/crawl-boss-idea-market.sh {{run_id}} --from-query-pack --search-provider {{search_provider}} --output {{search_results}}
    required_inputs:
      - run_id
      - search_provider
      - search_results
    optional_inputs:
      - results_only
      - seeds
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/schemas/boss-idea-market-candidate-urls.schema.yaml
      - agentic/schemas/boss-idea-market-search.schema.yaml
      - agentic/schemas/boss-idea-research.schema.yaml
      - agentic/fixtures/boss-idea-response/market-crawl-seeds.yaml
    writes:
      - "{{search_results}}"
      - agentic/runs/{{run_id}}/market-research-query-pack.yaml
      - agentic/runs/{{run_id}}/market-candidate-urls.yaml
      - agentic/runs/{{run_id}}/crawl4ai/crawl-log.yaml
      - agentic/runs/{{run_id}}/crawl4ai/raw/
      - agentic/runs/{{run_id}}/market-research.md
      - agentic/runs/{{run_id}}/manifest.yaml
    success_signals:
      - stdout_contains: boss idea market crawl collected
      - file_exists: "{{search_results}}"
      - manifest_path: agentic/runs/{{run_id}}/manifest.yaml
    failure_states:
      - blocked_schema_invalid
      - blocked_missing_source
      - blocked_human_decision_required
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: score_boss_idea_feasibility
    purpose: Validate and summarize boss idea feasibility scorecard inputs.
    mode: planning
    command_template: scripts/score-boss-idea-feasibility.sh --dry-run {{scorecard_file}}
    required_inputs:
      - scorecard_file
    optional_inputs: []
    reads:
      - "{{scorecard_file}}"
      - agentic/schemas/boss-idea-scorecard.schema.yaml
    writes: []
    success_signals:
      - stdout_contains: boss idea feasibility ok
    failure_states:
      - blocked_schema_invalid
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: generate_boss_decision_memo
    purpose: Generate a public-safe boss decision memo template for a planning run.
    mode: planning
    authorization:
      action: artifact.generate
    command_template: scripts/generate-boss-decision-memo.sh --output {{memo_file}} {{run_id}}
    required_inputs:
      - run_id
      - memo_file
    optional_inputs: []
    reads:
      - agentic/runs/{{run_id}}/manifest.yaml
      - agentic/schemas/boss-decision-memo.schema.yaml
    writes:
      - "{{memo_file}}"
    success_signals:
      - stdout_contains: boss decision memo generated
      - file_exists: "{{memo_file}}"
    failure_states:
      - blocked_schema_invalid
      - blocked_missing_source
    retry_policy:
      retryable: false
      max_attempts: 1
      requires_human_decision_on_exhaustion: true

  - id: validate_boss_decision_memo
    purpose: Validate a boss decision memo contract.
    mode: planning
    command_template: scripts/validate-boss-decision-memo.sh {{memo_file}}
    required_inputs:
      - memo_file
    optional_inputs: []
    reads:
      - "{{memo_file}}"
      - agentic/schemas/boss-decision-memo.schema.yaml
    writes: []
    success_signals:
      - stdout_contains: boss decision memo ok
    failure_states:
      - blocked_schema_invalid
    retry_policy:
      retryable: true
      max_attempts: 2
      requires_human_decision_on_exhaustion: true

  - id: plan_boss_idea_poc_mvp
    purpose: Generate a POC or MVP timebox plan template.
    mode: planning
    command_template: scripts/plan-boss-idea-poc-mvp.sh {{work_type}}
    required_inputs:
      - work_type
    optional_inputs: []
    reads:
      - docs/architecture/boss-idea-modules/poc-mvp-timebox.md
      - agentic/schemas/boss-idea-poc-mvp.schema.yaml
    writes: []
    success_signals:
      - stdout_contains: "work_type:"
    failure_states:
