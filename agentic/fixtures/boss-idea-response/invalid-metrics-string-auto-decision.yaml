plan_timebox_days: 5
metrics:
  - name: reviewed decision memo
    method: inspect tracked memo artifact
    threshold: memo has recommendation and evidence summary
    owner_role: Staff QA Architect
    decision_mapping:
      pass: supports go decision review
      fail: supports no_go decision review
      inconclusive: requires more research before decision
    evidence_path: agentic/reviews/boss-idea-response/metrics/result.md
    timebox_days: 5
    auto_decision: "true"
